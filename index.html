<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Tech Interview Telemetry</title>
    <style>
        /* ==========================================================================
           1. DESIGN TOKENS & BASE STYLES
           ========================================================================== */
        :root {
            /* Color Palette */
            --bg-base: #0a0a0a;
            --bg-surface: #121212;
            --bg-surface-hover: #1e1e1e;
            --border-subtle: #27272a;
            --border-focus: #52525b;
            
            --text-primary: #f4f4f5;
            --text-secondary: #a1a1aa;
            --text-muted: #52525b;
            
            --accent-primary: #3b82f6; /* Blue */
            --accent-glow: rgba(59, 130, 246, 0.15);
            --accent-success: #10b981;
            --accent-warning: #f59e0b;
            --accent-danger: #ef4444;

            /* Typography */
            --font-sans: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --font-mono: 'JetBrains Mono', 'Fira Code', Consolas, monospace;
            
            /* Spacing & Radii */
            --radius-sm: 4px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --space-xs: 4px;
            --space-sm: 8px;
            --space-md: 16px;
            --space-lg: 24px;
            --space-xl: 32px;
            
            /* Transitions */
            --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="light"] {
            --bg-base: #f8fafc;
            --bg-surface: #ffffff;
            --bg-surface-hover: #f1f5f9;
            --border-subtle: #e2e8f0;
            --border-focus: #cbd5e1;
            
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
        }

        [data-theme="light"] .header h1 {
            background: linear-gradient(to right, #0f172a, #334155);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        [data-theme="light"] .ai-btn {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.1), rgba(147, 51, 234, 0.1));
            border-color: rgba(147, 51, 234, 0.3);
            color: #7e22ce;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: var(--bg-base);
            color: var(--text-primary);
            font-family: var(--font-sans);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            overflow-y: scroll;
        }

        /* ==========================================================================
           2. LAYOUT & ARCHITECTURE
           ========================================================================== */
        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: var(--space-xl) var(--space-md);
        }

        .header {
            margin-bottom: var(--space-xl);
            border-bottom: 1px solid var(--border-subtle);
            padding-bottom: var(--space-lg);
            position: relative;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: var(--space-md);
        }

        .header-titles {
            flex: 1;
            min-width: 0;
        }

        .theme-toggle {
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            cursor: pointer;
            color: var(--text-primary);
            transition: all var(--transition-fast);
            flex-shrink: 0;
        }

        .header h1 {
            font-size: clamp(1.5rem, 3vw, 2.5rem);
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: var(--space-xs);
            background: linear-gradient(to right, #ffffff, #a1a1aa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 1rem;
            max-width: 600px;
        }

        /* Status Tracker Styles */
        .progress-container {
            margin-top: var(--space-lg);
            max-width: 500px;
        }
        .progress-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: var(--space-xs);
            font-size: 0.9rem;
            color: var(--text-secondary);
            font-weight: 500;
        }
        .progress-bar {
            height: 8px;
            background: var(--bg-surface-hover);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-sm);
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: var(--accent-success);
            width: 0%;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .row-completed {
            opacity: 0.4;
        }
        .row-completed .q-link {
            text-decoration: line-through;
            color: var(--text-secondary);
        }
        .status-checkbox {
            cursor: pointer;
            width: 18px;
            height: 18px;
            accent-color: var(--accent-success);
        }

        /* Tabs Architecture */
        .tabs-container {
            display: flex;
            gap: var(--space-md);
            border-bottom: 1px solid var(--border-subtle);
            margin-bottom: var(--space-md);
            overflow-x: auto;
            white-space: nowrap;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none; /* Firefox */
        }
        .tabs-container::-webkit-scrollbar {
            display: none; /* Chrome/Safari */
        }
        .tab-btn {
            padding: var(--space-sm) var(--space-md);
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all var(--transition-fast);
        }
        .tab-btn:hover {
            color: var(--text-primary);
        }
        .tab-btn.active {
            color: var(--accent-primary);
            border-bottom-color: var(--accent-primary);
        }

        .sub-tabs-container {
            display: flex;
            gap: var(--space-sm);
            margin-bottom: var(--space-lg);
            overflow-x: auto; 
            white-space: nowrap; 
            padding-bottom: 8px; 
            -webkit-overflow-scrolling: touch; 
            scrollbar-width: none;
        }
        .sub-tabs-container::-webkit-scrollbar { display: none; }
        .sub-tab-btn {
            padding: 6px 12px;
            border-radius: var(--radius-md);
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition-fast);
            flex-shrink: 0;
        }
        .sub-tab-btn:hover {
            border-color: var(--border-focus);
            color: var(--text-primary);
        }
        .sub-tab-btn.active {
            background: var(--accent-primary);
            color: #ffffff;
            border-color: var(--accent-primary);
        }
        .hidden {
            display: none !important;
        }

        /* Controls / Tool bar */
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: var(--space-md);
            margin-bottom: var(--space-lg);
            background: var(--bg-surface);
            padding: var(--space-md);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-subtle);
            align-items: center;
            justify-content: space-between;
        }

        .toolbar-group {
            display: flex;
            flex-wrap: wrap;
            gap: var(--space-md);
            align-items: center;
        }

        /* Forms & Inputs */
        input[type="text"], select {
            background: var(--bg-base);
            border: 1px solid var(--border-subtle);
            color: var(--text-primary);
            padding: 8px 12px;
            border-radius: var(--radius-md);
            font-family: var(--font-sans);
            font-size: 0.9rem;
            transition: border-color var(--transition-fast);
            outline: none;
        }

        input[type="text"]:focus, select:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 2px var(--accent-glow);
        }

        input[type="text"] { min-width: 250px; }

        button {
            background: var(--bg-surface-hover);
            color: var(--text-primary);
            border: 1px solid var(--border-subtle);
            padding: 8px 16px;
            border-radius: var(--radius-md);
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition-fast);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        button:hover {
            background: var(--text-primary);
            color: var(--bg-base);
        }

        /* AI Features */
        .ai-btn {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.1), rgba(147, 51, 234, 0.1));
            border: 1px solid rgba(147, 51, 234, 0.3);
            color: #d8b4fe;
            transition: all var(--transition-fast);
        }
        .ai-btn:hover {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.2), rgba(147, 51, 234, 0.2));
            border-color: rgba(147, 51, 234, 0.6);
            box-shadow: 0 0 10px rgba(147, 51, 234, 0.2);
        }
        .ai-btn-small {
            padding: 4px 8px;
            font-size: 0.8rem;
            border-radius: var(--radius-sm);
        }

        /* ==========================================================================
           3. DATA VISUALIZATION (Grid/Tables & Accordions)
           ========================================================================== */
        .group-container {
            margin-bottom: var(--space-md);
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            overflow: hidden;
        }

        details > summary {
            list-style: none;
            padding: var(--space-md) var(--space-lg);
            cursor: pointer;
            font-weight: 600;
            font-size: 1.1rem;
            background: var(--bg-surface);
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: background var(--transition-fast);
        }
        details > summary::-webkit-details-marker { display: none; }
        details > summary:hover { background: var(--bg-surface-hover); }
        
        details > summary::after {
            content: '↓';
            font-family: var(--font-mono);
            color: var(--text-muted);
            transition: transform var(--transition-fast);
        }
        details[open] > summary::after { transform: rotate(180deg); }

        .sub-group {
            border-top: 1px solid var(--border-subtle);
            background: rgba(255, 255, 255, 0.02);
        }
        
        .sub-group h4 {
            padding: var(--space-sm) var(--space-lg);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border-subtle);
        }

        /* Data Table */
        .data-table-wrapper {
            overflow-x: auto;
            width: 100%;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 0.9rem;
        }

        th, td {
            padding: 12px var(--space-lg);
            border-bottom: 1px solid var(--border-subtle);
            white-space: nowrap;
        }

        th {
            font-weight: 500;
            color: var(--text-secondary);
            background: var(--bg-surface);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        tbody tr:hover { background: var(--bg-surface-hover); }
        tbody tr:last-child td { border-bottom: none; }

        /* Question Links & Badges */
        .q-link {
            color: var(--text-primary);
            text-decoration: none;
            font-weight: 500;
            transition: color var(--transition-fast);
        }
        .q-link:hover { color: var(--accent-primary); text-decoration: underline; }

        .badge {
            display: inline-flex;
            align-items: center;
            padding: 2px 8px;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            font-family: var(--font-mono);
        }
        .badge.easy { background: rgba(16, 185, 129, 0.1); color: var(--accent-success); }
        .badge.medium { background: rgba(245, 158, 11, 0.1); color: var(--accent-warning); }
        .badge.hard { background: rgba(239, 68, 68, 0.1); color: var(--accent-danger); }

        .company-tag {
            background: var(--bg-base);
            border: 1px solid var(--border-subtle);
            padding: 2px 8px;
            border-radius: var(--radius-sm);
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-right: 4px;
            margin-bottom: 4px;
            display: inline-block;
        }

        /* Progress Bars */
        .metric-bar-container {
            width: 100px;
            height: 6px;
            background: var(--bg-base);
            border-radius: 3px;
            overflow: hidden;
            display: inline-block;
            vertical-align: middle;
            margin-right: 8px;
        }
        .metric-bar-fill {
            height: 100%;
            border-radius: 3px;
        }
        .metric-value {
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        /* Empty State */
        .empty-state {
            padding: var(--space-xl);
            text-align: center;
            color: var(--text-secondary);
        }

        /* Modal Overlay */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity var(--transition-fast);
        }
        .modal-overlay.active {
            opacity: 1;
            pointer-events: all;
        }
        .modal-content {
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            width: 90%;
            max-width: 700px;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            transform: translateY(20px);
            transition: transform var(--transition-fast);
        }
        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }
        .modal-header {
            padding: var(--space-md) var(--space-lg);
            border-bottom: 1px solid var(--border-subtle);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-header h2 {
            font-size: 1.25rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .close-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0;
        }
        .close-btn:hover { color: var(--text-primary); }
        .modal-body {
            padding: var(--space-lg);
            overflow-y: auto;
            font-size: 0.95rem;
            line-height: 1.6;
            color: var(--text-primary);
        }
        .modal-body p { margin-bottom: 1em; }
        .modal-body strong { color: #fff; }
        .modal-body ul { margin-left: 1.5em; margin-bottom: 1em; }
        .modal-body li { margin-bottom: 0.5em; }

        .loader {
            display: none;
            text-align: center;
            padding: var(--space-xl);
            color: var(--text-secondary);
            font-family: var(--font-mono);
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* Mobile & Tablet Adjustments */
        @media (max-width: 1024px) {
            .app-container { padding: var(--space-lg) var(--space-md); }
            .metric-bar-container { width: 70px; }
        }

        @media (max-width: 768px) {
            .app-container { padding: var(--space-md) var(--space-sm); }
            
            .header-top { flex-direction: column; align-items: stretch; }
            .theme-toggle { position: absolute; top: 0; right: 0; }
            .header h1 { padding-right: 50px; font-size: 1.8rem; margin-top: 2px; }
            .header p { font-size: 0.95rem; }
            
            .toolbar { flex-direction: column; align-items: stretch; padding: var(--space-md); gap: var(--space-md); }
            .toolbar-group { flex-direction: column; align-items: stretch; width: 100%; gap: var(--space-sm); }
            .toolbar-group > * { width: 100%; }
            .toolbar-group label { display: none; }
            input[type="text"] { min-width: 100%; }
            
            .tabs-container { gap: var(--space-sm); padding-bottom: 2px; }
            .tab-btn { font-size: 1rem; padding: var(--space-xs) var(--space-sm); }

            .data-table-wrapper { padding-bottom: var(--space-sm); }
            table { border-collapse: separate; border-spacing: 0; }
            th, td { padding: 12px 10px; font-size: 0.85rem; }
            td:nth-child(2) { white-space: normal; min-width: 160px; }
            
            .metric-bar-container { width: 50px; margin-right: 4px; }
            .badge { padding: 3px 6px; font-size: 0.7rem; }
            
            .modal-content { width: 95%; max-height: 90vh; }
            .modal-body { padding: var(--space-md); font-size: 0.9rem; }
            
            .progress-container { margin-top: var(--space-md); width: 100%; max-width: 100%; }
        }

        @media (max-width: 480px) {
            .header h1 { font-size: 1.5rem; }
            td:nth-child(2) { min-width: 130px; }
            .metric-bar-container { display: none; }
            .metric-value { font-weight: 600; }
            .company-tag { font-size: 0.7rem; padding: 2px 4px; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <header class="header">
        <div class="header-top">
            <div class="header-titles">
                <h1>DSA Mastery Dashboard</h1>
                <p>Telemetry and ROI tracking for elite technical interview patterns. Stop grinding randomly. Focus on highest-yield subsets.</p>
                
                <!-- Status Tracker -->
                <div class="progress-container">
                    <div class="progress-header">
                        <span id="progressText">0 / 0 Questions Mastered</span>
                        <span id="progressPercent">0%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                </div>
            </div>
            <button id="themeToggleBtn" aria-label="Toggle Theme" class="theme-toggle">
                ☀️
            </button>
        </div>
    </header>

    <!-- Main Navigation Tabs -->
    <div class="tabs-container" role="tablist">
        <div class="tab-btn active" id="tabDSA" role="tab" onclick="switchMainTab('dsa')">Data Structures & Algorithms</div>
        <div class="tab-btn" id="tabSD" role="tab" onclick="switchMainTab('sd')">System Design</div>
        <div class="tab-btn" id="tabSQL" role="tab" onclick="switchMainTab('sql')">SQL</div>
    </div>

    <!-- System Design Sub-Tabs (Hidden by default) -->
    <div class="sub-tabs-container hidden" id="subTabsSD">
        <button class="sub-tab-btn active" id="subTabHLD" onclick="switchSubTab('hld')">High-Level Design (HLD)</button>
        <button class="sub-tab-btn" id="subTabLLD" onclick="switchSubTab('lld')">Low-Level Design (LLD)</button>
    </div>

    <!-- SQL Sub-Tabs (Hidden by default) -->
    <div class="sub-tabs-container hidden" id="subTabsSQL">
        <button class="sub-tab-btn active" id="subTabTopSql" onclick="switchSqlSubTab('topSql')">Top SQL Questions</button>
        <button class="sub-tab-btn" id="subTabDbTheory" onclick="switchSqlSubTab('dbTheory')">Database Theory FAQs</button>
    </div>

    <div class="toolbar" role="toolbar" aria-label="Data controls">
        <div class="toolbar-group">
            <input type="text" id="searchInput" placeholder="Search questions, patterns, companies..." aria-label="Search">
        </div>
        <div class="toolbar-group">
            <label for="groupBySelect" style="color: var(--text-secondary); font-size: 0.9rem;">Group By:</label>
            <select id="groupBySelect" aria-label="Group Data By">
                <option value="pattern">Coding Pattern (Recommended)</option>
                <option value="company">Company</option>
            </select>

            <label for="sortBySelect" style="color: var(--text-secondary); font-size: 0.9rem;">Sort By:</label>
            <select id="sortBySelect" aria-label="Sort Data By">
                <option value="default">Optimal Learning Path</option>
                <option value="prob-desc">Interview Probability (High to Low)</option>
                <option value="pop-desc">Popularity Score (High to Low)</option>
                <option value="diff-asc">Difficulty (Easy to Hard)</option>
            </select>

            <button id="exportBtn" aria-label="Export to CSV">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                Export CSV
            </button>
            <button id="aiStudyPlanBtn" class="ai-btn" aria-label="Generate AI Study Plan">
                ✨ Generate Study Plan
            </button>
        </div>
    </div>

    <!-- Main Data Canvas -->
    <main id="dataCanvas" aria-live="polite"></main>

</div>

<!-- AI Modal -->
<div class="modal-overlay" id="aiModal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 id="aiModalTitle">✨ AI Assistant</h2>
            <button class="close-btn" id="closeModalBtn">&times;</button>
        </div>
        <div id="aiLoader" class="loader">Communicating with Gemini...</div>
        <div class="modal-body" id="aiModalBody"></div>
    </div>
</div>

<script>
/**
 * ============================================================================
 * ELITE DSA DATASET (JSON STRUCTURE)
 * Neetcode 150 + Grind 75 Master List
 * ============================================================================
 */
const db = [
    {
        pattern: "Arrays & Hashing",
        subPatterns: [
            {
                name: "Hashing Fundamentals",
                questions: [
                    { id: "q1", title: "Contains Duplicate", url: "https://leetcode.com/problems/contains-duplicate/", diff: "Easy", pop: 9.5, prob: 85, companies: ["Amazon", "Apple", "Google"] },
                    { id: "q2", title: "Valid Anagram", url: "https://leetcode.com/problems/valid-anagram/", diff: "Easy", pop: 9.2, prob: 80, companies: ["Google", "Bloomberg", "Amazon"] },
                    { id: "q3", title: "Two Sum", url: "https://leetcode.com/problems/two-sum/", diff: "Easy", pop: 10.0, prob: 95, companies: ["Amazon", "Meta", "Google", "Microsoft"] },
                    { id: "q4", title: "Group Anagrams", url: "https://leetcode.com/problems/group-anagrams/", diff: "Medium", pop: 9.8, prob: 92, companies: ["Amazon", "Microsoft", "Meta"] },
                    { id: "q5", title: "Top K Frequent Elements", url: "https://leetcode.com/problems/top-k-frequent-elements/", diff: "Medium", pop: 9.6, prob: 88, companies: ["Meta", "Amazon", "Google"] }
                ]
            },
            {
                name: "Array Transformations",
                questions: [

/**
 * ============================================================================
 * STATE MANAGEMENT
 * Single source of truth for the application state.
 * ============================================================================
 */
const state = {
    mainTab: 'dsa',      // 'dsa' | 'sd' | 'sql'
    sdSubTab: 'hld',     // 'hld' | 'lld'
    sqlSubTab: 'topSql', // 'topSql' | 'dbTheory'
    searchQuery: '',
    groupBy: 'pattern',  // 'pattern' | 'company'
    sortBy: 'default',   // 'default' | 'prob-desc' | 'pop-desc' | 'diff-asc'
    completed: new Set(JSON.parse(localStorage.getItem('dsa_completed') || '[]'))
};

// Difficulty mapping for sorting
const diffVal = { "Easy": 1, "Medium": 2, "Hard": 3 };

/**
 * ============================================================================
 * CORE LOGIC & DATA TRANSFORMATIONS
 * ============================================================================
 */

function getActiveDB() {
    if (state.mainTab === 'dsa') return db;
    if (state.mainTab === 'sd' && state.sdSubTab === 'hld') return sdHldDb;
    if (state.mainTab === 'sd' && state.sdSubTab === 'lld') return sdLldDb;
    if (state.mainTab === 'sql' && state.sqlSubTab === 'topSql') return sqlTopDb;
    if (state.mainTab === 'sql' && state.sqlSubTab === 'dbTheory') return sqlTheoryDb;
    return db;
}

// Flattens DB to apply search and global transforms easily
function getFlatQuestions() {
    let flat = [];
    const activeDb = getActiveDB();
    activeDb.forEach(pattern => {
        pattern.subPatterns.forEach(sub => {
            sub.questions.forEach(q => {
                flat.push({
                    ...q,
                    patternName: pattern.pattern,
                    subPatternName: sub.name
                });
            });
        });
    });
    return flat;
}

// Applies active Search and Sort to an array of questions
function sortAndFilterQuestions(questions) {
    let filtered = questions;

    // Apply Search
    if (state.searchQuery) {
        const query = state.searchQuery.toLowerCase();
        filtered = filtered.filter(q => 
            q.title.toLowerCase().includes(query) || 
            q.patternName.toLowerCase().includes(query) ||
            q.companies.some(c => c.toLowerCase().includes(query))
        );
    }

    // Apply Sort
    if (state.sortBy !== 'default') {
        filtered.sort((a, b) => {
            switch (state.sortBy) {
                case 'prob-desc': return b.prob - a.prob;
                case 'pop-desc': return b.pop - a.pop;
                case 'diff-asc': return diffVal[a.diff] - diffVal[b.diff];
                default: return 0;
            }
        });
    }

    return filtered;
}

// Visual components builders
function createBadge(diff) {
    return `<span class="badge ${diff.toLowerCase()}">${diff}</span>`;
}

function createMetricBar(val, max, colorClass, isPercent = false) {
    const percentage = (val / max) * 100;
    const color = percentage > 80 ? 'var(--accent-success)' : percentage > 50 ? 'var(--accent-warning)' : 'var(--accent-primary)';
    return `
        <div style="display: flex; align-items: center;">
            <div class="metric-bar-container">
                <div class="metric-bar-fill" style="width: ${percentage}%; background-color: ${color};"></div>
            </div>
            <span class="metric-value">${val}${isPercent ? '%' : '/10'}</span>
        </div>
    `;
}

function createCompanyTags(companies) {
    return companies.map(c => `<span class="company-tag">${c}</span>`).join('');
}

window.toggleComplete = function(id, checkboxElement) {
    if (checkboxElement.checked) {
        state.completed.add(id);
        checkboxElement.closest('tr').classList.add('row-completed');
    } else {
        state.completed.delete(id);
        checkboxElement.closest('tr').classList.remove('row-completed');
    }
    try { localStorage.setItem('dsa_completed', JSON.stringify([...state.completed])); } catch(e) {}
    updateProgress();
};

function updateProgress() {
    const activeQuestions = getFlatQuestions();
    const total = activeQuestions.length;
    
    // Calculate progress based ONLY on the currently active tab
    let completedInTab = 0;
    activeQuestions.forEach(q => {
        if (state.completed.has(q.id)) completedInTab++;
    });

    const percent = total === 0 ? 0 : Math.round((completedInTab / total) * 100);
    
    const fill = document.getElementById('progressFill');
    const text = document.getElementById('progressText');
    const percentText = document.getElementById('progressPercent');
    
    if(fill && text && percentText) {
        fill.style.width = `${percent}%`;
        text.textContent = `${completedInTab} / ${total} Questions Mastered`;
        percentText.textContent = `${percent}%`;
    }
}

function createTableRow(q, includePatternColumn = false, isSD = false) {
    const isCompleted = state.completed.has(q.id);
    
    // Dynamically build the Youtube HTML only if it's the SD Tab
    const sdCols = isSD ? `
        <td>${q.youtube ? `<a href="${q.youtube}" target="_blank" class="q-link" style="color: var(--accent-danger);">▶️ Video</a>` : '-'}</td>
    ` : '';

    return `
        <tr class="${isCompleted ? 'row-completed' : ''}">
            <td style="text-align: center;">
                <input type="checkbox" class="status-checkbox" onchange="toggleComplete('${q.id}', this)" ${isCompleted ? 'checked' : ''} aria-label="Mark ${q.title} as complete">
            </td>
            <td><a href="${q.url}" target="_blank" class="q-link">${q.title}</a></td>
            ${includePatternColumn ? `<td style="color: var(--text-secondary); font-size: 0.85rem;">${q.patternName}</td>` : ''}
            <td>${createBadge(q.diff)}</td>
            <td>${createMetricBar(q.pop, 10, 'var(--accent-primary)')}</td>
            <td>${createMetricBar(q.prob, 100, 'var(--accent-success)', true)}</td>
            <td>${createCompanyTags(q.companies)}</td>
            ${sdCols}
            <td><button class="ai-btn ai-btn-small" onclick="requestAIHint('${q.title}', '${q.patternName}')">✨ Hint</button></td>
        </tr>
    `;
}

// Render By Pattern (Default View)
function renderPatternView() {
    const fragment = document.createDocumentFragment();
    let hasResults = false;
    const activeDb = getActiveDB();
    const isSD = state.mainTab === 'sd';

    activeDb.forEach(pattern => {
        // We need to filter questions at the sub-pattern level based on state
        const processedSubPatterns = pattern.subPatterns.map(sub => {
            // Attach metadata for flat filtering
            const enhancedQs = sub.questions.map(q => ({...q, patternName: pattern.pattern, subPatternName: sub.name}));
            return {
                name: sub.name,
                questions: sortAndFilterQuestions(enhancedQs)
            };
        }).filter(sub => sub.questions.length > 0);

        if (processedSubPatterns.length === 0) return;
        hasResults = true;

        const detailsEl = document.createElement('details');
        detailsEl.className = 'group-container';
        detailsEl.open = true;

        let html = `<summary>${pattern.pattern} <span style="font-size:0.8rem; font-weight:normal; color:var(--text-secondary)">(${processedSubPatterns.reduce((acc, sub) => acc + sub.questions.length, 0)} questions)</span></summary>`;

        processedSubPatterns.forEach(sub => {
            html += `
                <div class="sub-group">
                    <h4>${sub.name}</h4>
                    <div class="data-table-wrapper">
                        <table>
                            <thead>
                                <tr>
                                    <th style="width: 5%; text-align: center;">Done</th>
                                    <th style="width: 25%">Question</th>
                                    <th style="width: 10%">Difficulty</th>
                                    <th style="width: 15%">Popularity</th>
                                    <th style="width: 15%">Interview Prob.</th>
                                    <th style="width: 20%">Target Companies</th>
                                    ${isSD ? `<th style="width: 10%">YouTube</th>` : ''}
                                    <th style="width: 10%">AI</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${sub.questions.map(q => createTableRow(q, false, isSD)).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
        });

        detailsEl.innerHTML = html;
        fragment.appendChild(detailsEl);
    });

    if (!hasResults) {
        fragment.innerHTML = `<div class="empty-state">No questions found matching your criteria.</div>`;
    }

    DOM.canvas.appendChild(fragment);
}

// Render By Company View
function renderCompanyView() {
    const fragment = document.createDocumentFragment();
    const flatQs = sortAndFilterQuestions(getFlatQuestions());
    const isSD = state.mainTab === 'sd';
    
    // Group by company
    const companyMap = {};
    flatQs.forEach(q => {
        q.companies.forEach(company => {
            if (!companyMap[company]) companyMap[company] = [];
            companyMap[company].push(q);
        });
    });

    const sortedCompanies = Object.keys(companyMap).sort();

    if (sortedCompanies.length === 0) {
        DOM.canvas.innerHTML = `<div class="empty-state">No questions found matching your criteria.</div>`;
        return;
    }

    sortedCompanies.forEach(company => {
        const detailsEl = document.createElement('details');
        detailsEl.className = 'group-container';
        detailsEl.open = true;

        const questionsHTML = companyMap[company].map(q => createTableRow(q, true, isSD)).join('');

        detailsEl.innerHTML = `
            <summary>${company} <span style="font-size:0.8rem; font-weight:normal; color:var(--text-secondary)">(${companyMap[company].length} questions)</span></summary>
            <div class="data-table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th style="width: 5%; text-align: center;">Done</th>
                            <th style="width: 20%">Question</th>
                            <th style="width: 15%">Pattern</th>
                            <th style="width: 10%">Difficulty</th>
                            <th style="width: 10%">Popularity</th>
                            <th style="width: 15%">Interview Prob.</th>
                            <th style="width: 15%">All Companies</th>
                            ${isSD ? `<th style="width: 10%">YouTube</th>` : ''}
                            <th style="width: 10%">AI</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${questionsHTML}
                    </tbody>
                </table>
            </div>
        `;
        fragment.appendChild(detailsEl);
    });

    DOM.canvas.appendChild(fragment);
}

// Main Render Dispatcher
function render() {
    DOM.canvas.innerHTML = ''; // Clear canvas
    if (state.groupBy === 'pattern') {
        renderPatternView();
    } else {
        renderCompanyView();
    }
}

    document.getElementById('tabDSA').classList.toggle('active', tabName === 'dsa');

    subTabsSD.classList.toggle('hidden', tabName !== 'sd');

/**
 * ============================================================================
 * EXPORT CAPABILITIES
 * High-performance CSV generation.
 * ============================================================================
 */
function exportToCSV() {
    const flatQs = sortAndFilterQuestions(getFlatQuestions());
    if(flatQs.length === 0) {
        alert("No data to export.");
        return;
    }

    const headers = ['Question Title', 'URL', 'Pattern', 'Sub-Pattern', 'Difficulty', 'Popularity (/10)', 'Probability (%)', 'Companies', 'YouTube'];
    const rows = flatQs.map(q => [
        `"${q.title}"`,
        `"${q.url}"`,
        `"${q.patternName}"`,
        `"${q.subPatternName}"`,
        `"${q.diff}"`,
        q.pop,
        q.prob,
        `"${q.companies.join(', ')}"`,
        `"${q.youtube || ''}"`
    ]);

    const csvContent = [headers.join(','), ...rows.map(e => e.join(','))].join('\n');
    
    const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const link = document.createElement("a");
    link.setAttribute("href", url);
    link.setAttribute("download", "tech_interview_telemetry.csv");
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}

/**
 * ============================================================================
 * GEMINI API INTEGRATION
 * ============================================================================
 */
const apiKey = ""; // API key is injected by the environment

async function fetchGeminiResponse(prompt, systemPrompt) {
    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
    const payload = {
        contents: [{ parts: [{ text: prompt }] }],
        systemInstruction: { parts: [{ text: systemPrompt }] }
    };

    let retries = 0;
    const delays = [1000, 2000, 4000, 8000, 16000]; // Exponential backoff

    while (retries < 5) {
        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            
            if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
            
            const result = await response.json();
            return result.candidates?.[0]?.content?.parts?.[0]?.text || "No response generated.";
        } catch (error) {
            if (retries === 4) return `Error fetching AI response: ${error.message}. Please try again later.`;
            await new Promise(res => setTimeout(res, delays[retries]));
            retries++;
        }
    }
}

// Simple markdown parser for bold, italics, code, and lists
function parseMarkdownToHTML(text) {
    let html = text
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.*?)\*/g, '<em>$1</em>')
        .replace(/`(.*?)`/g, '<code style="background:#27272a;padding:2px 4px;border-radius:4px;">$1</code>')
        .replace(/\n\n/g, '</p><p>')
        .replace(/\n\* (.*)/g, '<br>• $1')
        .replace(/\n- (.*)/g, '<br>• $1');
    return `<p>${html}</p>`;
}

function openModal(title) {
    DOM.aiModalTitle.innerHTML = title;
    DOM.aiModalBody.innerHTML = '';
    DOM.aiLoader.style.display = 'block';
    DOM.aiModal.classList.add('active');
}

function closeModal() {
    DOM.aiModal.classList.remove('active');
}

async function requestAIHint(questionTitle, patternName) {
    openModal(`✨ Hint: ${questionTitle}`);
    
    const systemPrompt = "You are an elite Staff Software Engineer mentoring a candidate. Provide a concise, conceptual hint and the time/space complexity intuition. Do NOT give the actual code. Focus on the core 'aha!' moment.";
    const userPrompt = `Give me a conceptual hint for the interview problem '${questionTitle}' which typically falls under the '${patternName}' pattern.`;
    
    const responseText = await fetchGeminiResponse(userPrompt, systemPrompt);
    
    DOM.aiLoader.style.display = 'none';
    DOM.aiModalBody.innerHTML = parseMarkdownToHTML(responseText);
}

async function generateStudyPlan() {
    openModal(`✨ Your Custom Study Plan`);
    
    // Get currently visible questions
    const flatQs = sortAndFilterQuestions(getFlatQuestions());
    if (flatQs.length === 0) {
        DOM.aiLoader.style.display = 'none';
        DOM.aiModalBody.innerHTML = "<p>No questions currently visible to generate a plan from. Please adjust your filters.</p>";
        return;
    }

    // Pass up to 15 questions to avoid context bloat in prompt
    const sampleQs = flatQs.slice(0, 15).map(q => q.title).join(', ');
    
    const systemPrompt = "You are an expert technical interview coach. Given a list of technical topics, create a structured, highly focused 1-week study plan. Group them logically by concepts. Be extremely concise and use markdown.";
    const userPrompt = `Create a 1-week study plan to master these specific interview topics/questions: ${sampleQs}. Provide daily goals.`;
    
    const responseText = await fetchGeminiResponse(userPrompt, systemPrompt);
    
    DOM.aiLoader.style.display = 'none';
    DOM.aiModalBody.innerHTML = parseMarkdownToHTML(responseText);
}

/**
 * ============================================================================
 * EVENT LISTENERS & INITIALIZATION
 * ============================================================================
 */
function init() {
    // Debounced Search Setup
    let searchTimeout;
    DOM.searchInput.addEventListener('input', (e) => {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => {
            state.searchQuery = e.target.value.trim();
            render();
        }, 300); // 300ms debounce
    });

    // Dropdowns
    DOM.groupBySelect.addEventListener('change', (e) => {
        state.groupBy = e.target.value;
        render();
    });

    DOM.sortBySelect.addEventListener('change', (e) => {
        state.sortBy = e.target.value;
        render();
    });

    // Action Buttons
    DOM.exportBtn.addEventListener('click', exportToCSV);
    DOM.aiStudyPlanBtn.addEventListener('click', generateStudyPlan);

    // Theme Toggle Logic
    const themeToggleBtn = document.getElementById('themeToggleBtn');
    let currentTheme = localStorage.getItem('theme') || 'dark';
    if (currentTheme === 'light') {
        document.documentElement.setAttribute('data-theme', 'light');
        themeToggleBtn.innerHTML = '🌙';
    }
    themeToggleBtn.addEventListener('click', () => {
        currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', currentTheme);
        themeToggleBtn.innerHTML = currentTheme === 'dark' ? '☀️' : '🌙';
        try { localStorage.setItem('theme', currentTheme); } catch(e) {}
    });

    // Modal Events
    DOM.closeModalBtn.addEventListener('click', closeModal);
    DOM.aiModal.addEventListener('click', (e) => {
        if (e.target === DOM.aiModal) closeModal();
    });

    // Initial Paint
    updateProgress();
    render();
}

// Bootstrap Application
document.addEventListener('DOMContentLoaded', init);

</script>
